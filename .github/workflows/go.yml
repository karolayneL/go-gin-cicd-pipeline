name: Go CI

on:
  push:
    branches: [ main, karolayneL-patch-2 ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21

    - name: Wait for PostgreSQL
      run: |
        until docker compose exec -T postgres pg_isready -U postgres; do
          echo 'Waiting for PostgreSQL...'
          sleep 1
        done

    - name: Lint
      run: docker run --rm -v ${{ github.workspace }}:/app -w /app golangci/golangci-lint golangci-lint run controllers/ database/ models/ routes/

    - name: Test
      run: go test -v -race -cover ./...
