name: Continuous Integration

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: main-ci-check 
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alura
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21

    - name: Wait for PostgreSQL to be ready
      run: |
        for i in {1..10}; do
          if pg_isready -h localhost -U postgres; then
            echo "PostgreSQL is ready!"
            exit 0
          fi
          echo "Waiting for PostgreSQL... ($i/10)"
          sleep 2
        done
        echo "PostgreSQL failed to start"
        exit 1

    - name: Setup test database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS alura;"
        PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE alura;"

    - name: Lint
      run: |
        docker run --rm -v ${{ github.workspace }}:/app -w /app \
          golangci/golangci-lint golangci-lint run controllers/ database/ models/ routes/

    - name: Test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: alura
      run: go test -v -race -cover ./...
